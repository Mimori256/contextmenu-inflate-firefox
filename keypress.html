<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Key hold INP inflation repro</title>
    <style>
      body {
        font-family: monospace;
        padding: 16px;
      }
      #instructions {
        margin-bottom: 12px;
      }
      #out {
        white-space: pre;
        font-size: 13px;
      }
      .inp {
        color: #c00;
        font-weight: bold;
      }
      .raw {
        color: #555;
      }
    </style>
  </head>
  <body>
    <div id="instructions">
      <strong>Repro: Key hold inflates INP on Firefox</strong><br />
      1. Click anywhere to focus<br />
      2. Hold down <em>any key</em> (e.g. `a`) for a few seconds<br />
      3. Do not move the mouse cursor while holding the key<br />
      4. Events are observed when you move the mouse cursor after holding the
      key<br />
      5. Check the INP value in the output<br />
    </div>
    <pre id="out"></pre>

    <script>
      const out = document.getElementById("out");

      function log(text, cls) {
        const line = document.createElement("span");
        if (cls) line.className = cls;
        line.textContent = text + "\n";
        out.appendChild(line);
      }

      // --- INP calculation (simplified web-vitals style) ---
      let maxInp = 0;

      new PerformanceObserver((list) => {
        for (const entry of list.getEntries()) {
          const iid = entry.interactionId;

          // RAW: show all events with interactionId
          if (iid && iid !== 0) {
            const inputDelay = (
              entry.processingStart - entry.startTime
            ).toFixed(1);
            const processing = (
              entry.processingEnd - entry.processingStart
            ).toFixed(1);
            const presentationDelay = (
              entry.duration -
              (entry.processingEnd - entry.startTime)
            ).toFixed(1);
            log(
              `[RAW] event=${entry.name.padEnd(12)} ` +
                `duration=${entry.duration}ms  ` +
                `inputDelay=${inputDelay}ms  ` +
                `processing=${processing}ms  ` +
                `presentationDelay=${presentationDelay}ms`,
              "raw",
            );
          }

          // INP candidate: interactionId != 0
          if (iid && iid !== 0 && entry.duration > maxInp) {
            maxInp = entry.duration;
            const rating =
              maxInp < 200
                ? "good"
                : maxInp < 500
                  ? "needs-improvement"
                  : "poor";
            log(
              `[INP] value=${maxInp}ms  rating=${rating}\n` +
                `      inputDelay=${(entry.processingStart - entry.startTime).toFixed(1)}ms  ` +
                `processingDuration=${(entry.processingEnd - entry.processingStart).toFixed(1)}ms  ` +
                `presentationDelay=${(entry.duration - (entry.processingEnd - entry.startTime)).toFixed(1)}ms`,
              "inp",
            );
          }
        }
      }).observe({ type: "event", buffered: true, durationThreshold: 0 });

      log("Waiting for interactions…");
    </script>
  </body>
</html>
